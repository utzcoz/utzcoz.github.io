<script>
(function() {
  // Theme toggle
  var toggle = document.getElementById('theme-toggle');
  var iconSun = toggle.querySelector('.icon-sun');
  var iconMoon = toggle.querySelector('.icon-moon');

  function updateIcons() {
    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    iconSun.style.display = isDark ? 'none' : 'block';
    iconMoon.style.display = isDark ? 'block' : 'none';
  }

  updateIcons();

  toggle.addEventListener('click', function() {
    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    if (isDark) {
      document.documentElement.removeAttribute('data-theme');
      localStorage.setItem('theme', 'light');
    } else {
      document.documentElement.setAttribute('data-theme', 'dark');
      localStorage.setItem('theme', 'dark');
    }
    updateIcons();
  });

  // Mobile nav toggle
  var navToggle = document.getElementById('nav-toggle');
  var nav = document.getElementById('site-nav');

  navToggle.addEventListener('click', function() {
    nav.classList.toggle('nav-open');
    var expanded = nav.classList.contains('nav-open');
    navToggle.setAttribute('aria-expanded', expanded);
  });
})();
</script>
<script>
// Wrap tables in scrollable containers
(function() {
  var tables = document.querySelectorAll('.post-content > table');
  for (var i = 0; i < tables.length; i++) {
    var wrapper = document.createElement('div');
    wrapper.className = 'table-wrapper';
    tables[i].parentNode.insertBefore(wrapper, tables[i]);
    wrapper.appendChild(tables[i]);
  }
})();
</script>
<script>
// Article TOC sidebar — scan h2/h3 headings and build nav
(function() {
  var sidebar = document.querySelector('.toc-sidebar');
  var content = document.querySelector('.post-content');
  if (!sidebar || !content) return;

  var headings = content.querySelectorAll('h2, h3');
  if (headings.length < 2) return;

  // Ensure each heading has an id for anchor links
  for (var i = 0; i < headings.length; i++) {
    if (!headings[i].id) {
      headings[i].id = 'heading-' + i;
    }
  }

  // Build TOC markup
  var html = '<div class="toc-title">On this page</div><ol>';
  for (var i = 0; i < headings.length; i++) {
    var h = headings[i];
    var cls = h.tagName === 'H3' ? ' class="toc-h3"' : '';
    html += '<li' + cls + '><a href="#' + h.id + '">' + h.textContent + '</a></li>';
  }
  html += '</ol>';
  sidebar.innerHTML = html;

  // Scroll tracking via IntersectionObserver
  var links = sidebar.querySelectorAll('a');
  var headingMap = {};
  for (var i = 0; i < links.length; i++) {
    headingMap[links[i].getAttribute('href').slice(1)] = links[i];
  }

  var currentActive = null;

  var observer = new IntersectionObserver(function(entries) {
    // Find the topmost visible heading
    var visible = [];
    for (var i = 0; i < entries.length; i++) {
      if (entries[i].isIntersecting) {
        visible.push(entries[i]);
      }
    }

    if (visible.length > 0) {
      // Pick the one closest to the top
      visible.sort(function(a, b) {
        return a.boundingClientRect.top - b.boundingClientRect.top;
      });
      var id = visible[0].target.id;
      if (currentActive !== id) {
        if (currentActive && headingMap[currentActive]) {
          headingMap[currentActive].classList.remove('toc-active');
        }
        currentActive = id;
        if (headingMap[id]) {
          headingMap[id].classList.add('toc-active');
          // Scroll the TOC sidebar to keep active link visible
          headingMap[id].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }
      }
    }
  }, {
    rootMargin: '-' + 64 + 'px 0px -60% 0px',
    threshold: 0
  });

  for (var i = 0; i < headings.length; i++) {
    observer.observe(headings[i]);
  }

  // Smooth scroll on click
  sidebar.addEventListener('click', function(e) {
    var link = e.target.closest('a');
    if (!link) return;
    e.preventDefault();
    var target = document.getElementById(link.getAttribute('href').slice(1));
    if (target) {
      target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      history.replaceState(null, '', link.getAttribute('href'));
    }
  });
})();
</script>

<script>
// Convert ```mermaid fenced code blocks to .mermaid divs immediately
// (no mermaid dependency — just DOM manipulation).
// Jekyll renders ```mermaid as <pre><code class="language-mermaid">
(function() {
  var mermaidBlocks = document.querySelectorAll('pre code.language-mermaid');
  for (var i = 0; i < mermaidBlocks.length; i++) {
    var code = mermaidBlocks[i];
    var pre = code.parentElement;
    var div = document.createElement('div');
    div.className = 'mermaid';
    div.textContent = code.textContent;
    pre.parentElement.replaceChild(div, pre);
  }
})();

// Wait for deferred mermaid.js + theme.js to be available.
// Deferred scripts execute after parsing but before DOMContentLoaded.
document.addEventListener('DOMContentLoaded', function() {
  var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  mermaid.initialize({
    startOnLoad: false,
    theme: 'base',
    themeVariables: mermaidM3Expressive.getTheme(isDark)
  });
  mermaid.run();

  // Mermaid print: strip inline size constraints so SVGs scale to A4.
  // Mermaid renders SVGs with hardcoded width/height attributes and
  // inline style="max-width: NNNpx" that prevent CSS from scaling them.
  // We also need to ensure each SVG has a viewBox so it scales properly.
  var printBackups = [];
  window.addEventListener('beforeprint', function() {
    printBackups = [];
    var containers = document.querySelectorAll('.mermaid');
    for (var i = 0; i < containers.length; i++) {
      var div = containers[i];
      var svg = div.querySelector('svg');
      if (!svg) continue;

      var backup = {
        div: div,
        divStyle: div.getAttribute('style'),
        svg: svg,
        svgStyle: svg.getAttribute('style'),
        svgWidth: svg.getAttribute('width'),
        svgHeight: svg.getAttribute('height')
      };
      printBackups.push(backup);

      // Ensure viewBox exists so the SVG can scale
      if (!svg.getAttribute('viewBox')) {
        var w = svg.width.baseVal.value || svg.getBoundingClientRect().width;
        var h = svg.height.baseVal.value || svg.getBoundingClientRect().height;
        if (w && h) {
          svg.setAttribute('viewBox', '0 0 ' + w + ' ' + h);
          backup.addedViewBox = true;
        }
      }

      // Strip all inline sizing from the SVG
      svg.removeAttribute('width');
      svg.removeAttribute('height');
      svg.removeAttribute('style');
      svg.style.width = '100%';
      svg.style.height = 'auto';
      svg.style.maxWidth = 'none';

      // Also clear any max-width on the container div
      div.style.maxWidth = 'none';
      div.style.width = '100%';
      div.style.overflow = 'visible';
    }
  });
  window.addEventListener('afterprint', function() {
    for (var i = 0; i < printBackups.length; i++) {
      var b = printBackups[i];
      // Restore SVG
      b.svg.removeAttribute('style');
      if (b.svgStyle) b.svg.setAttribute('style', b.svgStyle);
      if (b.svgWidth) b.svg.setAttribute('width', b.svgWidth);
      if (b.svgHeight) b.svg.setAttribute('height', b.svgHeight);
      if (b.addedViewBox) b.svg.removeAttribute('viewBox');
      // Restore container
      b.div.removeAttribute('style');
      if (b.divStyle) b.div.setAttribute('style', b.divStyle);
    }
    printBackups = [];
  });

  // Mermaid click-to-zoom with pan & scroll-zoom
  function openMermaidZoom(mermaidEl) {
    var overlay = document.createElement('div');
    overlay.className = 'mermaid-zoom-overlay';

    var content = document.createElement('div');
    content.className = 'mermaid-zoom-content';
    content.innerHTML = mermaidEl.innerHTML;

    var closeBtn = document.createElement('button');
    closeBtn.className = 'mermaid-zoom-close';
    closeBtn.innerHTML = '&times;';
    closeBtn.setAttribute('aria-label', 'Close');

    var hint = document.createElement('div');
    hint.className = 'mermaid-zoom-hint';
    hint.textContent = 'Scroll to zoom \u00b7 Drag to pan \u00b7 Esc to close';

    overlay.appendChild(content);
    overlay.appendChild(closeBtn);
    overlay.appendChild(hint);
    document.body.appendChild(overlay);

    // State: tx/ty are pan offsets in px, (0,0) = centered via flexbox
    var scale = 1;
    var tx = 0, ty = 0;
    var dragging = false;
    var startX, startY, startTx, startTy;
    var rafId = null;

    function applyTransform() {
      content.style.transform = 'translate(' + tx + 'px, ' + ty + 'px) scale(' + scale + ')';
    }

    function scheduleTransform() {
      if (!rafId) {
        rafId = requestAnimationFrame(function() {
          rafId = null;
          applyTransform();
        });
      }
    }

    // Wheel zoom — centered on viewport center
    overlay.addEventListener('wheel', function(e) {
      e.preventDefault();
      var delta = e.deltaY > 0 ? 0.9 : 1.1;
      var newScale = Math.min(Math.max(scale * delta, 0.1), 8);
      // Scale pan offset so the center stays fixed
      var ratio = newScale / scale;
      tx = tx * ratio;
      ty = ty * ratio;
      scale = newScale;
      scheduleTransform();
    }, { passive: false });

    // Mouse drag to pan
    overlay.addEventListener('mousedown', function(e) {
      if (e.target === closeBtn) return;
      e.preventDefault();
      dragging = true;
      overlay.classList.add('is-dragging');
      startX = e.clientX;
      startY = e.clientY;
      startTx = tx;
      startTy = ty;
    });

    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);

    function onMouseMove(e) {
      if (!dragging) return;
      tx = startTx + (e.clientX - startX);
      ty = startTy + (e.clientY - startY);
      scheduleTransform();
    }

    function onMouseUp() {
      dragging = false;
      overlay.classList.remove('is-dragging');
    }

    // Touch support for pan and pinch-zoom
    var lastTouchDist = 0;
    overlay.addEventListener('touchstart', function(e) {
      if (e.target === closeBtn) return;
      if (e.touches.length === 1) {
        dragging = true;
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        startTx = tx;
        startTy = ty;
      } else if (e.touches.length === 2) {
        dragging = false;
        lastTouchDist = Math.hypot(
          e.touches[1].clientX - e.touches[0].clientX,
          e.touches[1].clientY - e.touches[0].clientY
        );
      }
    }, { passive: true });

    overlay.addEventListener('touchmove', function(e) {
      e.preventDefault();
      if (e.touches.length === 1 && dragging) {
        tx = startTx + (e.touches[0].clientX - startX);
        ty = startTy + (e.touches[0].clientY - startY);
        scheduleTransform();
      } else if (e.touches.length === 2) {
        var dist = Math.hypot(
          e.touches[1].clientX - e.touches[0].clientX,
          e.touches[1].clientY - e.touches[0].clientY
        );
        if (lastTouchDist > 0) {
          scale = Math.min(Math.max(scale * (dist / lastTouchDist), 0.1), 8);
          scheduleTransform();
        }
        lastTouchDist = dist;
      }
    }, { passive: false });

    overlay.addEventListener('touchend', function() {
      dragging = false;
      lastTouchDist = 0;
    });

    // Close
    function closeOverlay() {
      window.removeEventListener('mousemove', onMouseMove);
      window.removeEventListener('mouseup', onMouseUp);
      document.removeEventListener('keydown', onKey);
      if (rafId) cancelAnimationFrame(rafId);
      overlay.remove();
    }

    closeBtn.addEventListener('click', closeOverlay);

    // Double-click to reset zoom
    overlay.addEventListener('dblclick', function(e) {
      if (e.target === closeBtn) return;
      scale = 1;
      tx = 0;
      ty = 0;
      scheduleTransform();
    });

    function onKey(e) {
      if (e.key === 'Escape') closeOverlay();
    }
    document.addEventListener('keydown', onKey);
  }

  document.addEventListener('click', function(e) {
    var mermaidEl = e.target.closest('.mermaid');
    if (mermaidEl && !e.target.closest('.mermaid-zoom-overlay')) {
      openMermaidZoom(mermaidEl);
    }
  });
});
</script>
{% endif %}
