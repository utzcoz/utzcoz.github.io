---
layout: default
---

<article class="container" itemscope itemtype="http://schema.org/BlogPosting">
  <header class="post-header">
    <h1 class="post-title" itemprop="name headline">{{ page.title | escape }}</h1>
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}" itemprop="datePublished">
        {{ page.date | date: "%b %-d, %Y" }}
      </time>
      {%- if page.author -%}
        <span>&middot;</span>
        <span itemprop="author">{{ page.author }}</span>
      {%- endif -%}
      {%- if page.tags.size > 0 -%}
        <span>&middot;</span>
        {%- for tag in page.tags -%}
          <span class="post-tag">{{ tag }}</span>
        {%- endfor -%}
      {%- endif -%}
    </div>
  </header>

  <div class="post-content" itemprop="articleBody">
    {{ content }}
  </div>

  <div class="giscus"></div>
  <script src="https://giscus.app/client.js"
      data-repo="utzcoz/utzcoz.github.io"
      data-repo-id="MDEwOlJlcG9zaXRvcnkxNTM4NzIyNTg="
      data-category="Comments"
      data-category-id="DIC_kwDOCSvngs4CPcNC"
      data-mapping="pathname"
      data-reactions-enabled="1"
      data-emit-metadata="0"
      data-input-position="top"
      data-theme="preferred_color_scheme"
      data-lang="en"
      crossorigin="anonymous"
      async>
  </script>
  <script>
    (function() {
      function setGiscusTheme(theme) {
        var iframe = document.querySelector('iframe.giscus-frame');
        if (iframe) {
          iframe.contentWindow.postMessage(
            { giscus: { setConfig: { theme: theme } } },
            'https://giscus.app'
          );
        }
      }
      // Sync giscus theme with site theme on toggle
      var observer = new MutationObserver(function() {
        var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        setGiscusTheme(isDark ? 'dark' : 'light');
      });
      observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
      // Set initial theme once giscus iframe loads
      window.addEventListener('message', function(event) {
        if (event.origin !== 'https://giscus.app') return;
        var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        setGiscusTheme(isDark ? 'dark' : 'light');
      }, { once: true });
    })();
  </script>
</article>
