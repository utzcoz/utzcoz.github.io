#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
title: utzcoz's perosnal blog
description: ""
baseurl: "" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site, e.g. http://example.com
google_analytics: G-2CHF4K157C
author:
  name: utzcoz's blog
  bio: "Focus on AOSP, XR, and testing tools."
  projects:
    - name: Robolectric
      url: "https://github.com/robolectric/robolectric"
    - name: boringdroid
      url: "https://github.com/nicholasgasior/boringdroid"
    - name: MaruOS
      url: "https://github.com/nicholasgasior/maruos"

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Social links (used by header/footer)
social_links:
  - platform: github
    user_url: "https://github.com/utzcoz"
  - platform: x
    user_url: "https://x.com/utzcoz"

# Excerpt settings
excerpt_separator: "\n\n"

# Exclude from processing.
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - LICENSE
  - install-dependencies.sh
  - start-drafts.sh
  - start.sh
